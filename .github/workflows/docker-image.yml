name: Docker Image CI 

on:
  push:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: teslamate_fix_address
      ACR_REGISTRY: registry.cn-hangzhou.aliyuncs.com
      ACR_NAMESPACE: docker_bai 
    steps:
      - uses: actions/checkout@v4
      # 启用 QEMU 支持 arm64 构建
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 启用 Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker Hub 登录
      - name: Login Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 阿里云 ACR 登录
      - name: Login Alibaba Cloud ACR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALI_ACK_USERNAME }}
          password: ${{ secrets.ALI_ACK_TOKEN }}

      # 自动生成 tags / labels
      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # PR 仅 build 验证，不 push
      - name: Build Only (PR Validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false

      # 正式构建并推送
      - name: Build and Push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          cache-from: type=gha
          cache-to: type=gha,mode=max